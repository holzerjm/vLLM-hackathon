# GuideLLM scenario: code completion / reasoning
# Long outputs dominate — good for finding decode throughput ceilings
target: http://localhost:8000/v1
model: /models/llama-3.1-8b-instruct

rate_type: concurrent
rate: [1, 2, 4, 8]
duration: 60

data:
  prompt_tokens: 512
  output_tokens: 1024
  samples: 128

metrics:
  - time_to_first_token
  - time_per_output_token
  - output_tokens_per_second
  - end_to_end_latency_p99

output:
  file: results/code.json
