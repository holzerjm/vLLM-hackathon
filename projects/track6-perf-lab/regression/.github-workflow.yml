# Copy this file to .github/workflows/perf-regression.yml in your repo.
# It runs on every PR that touches serving config, fails if p99 latency
# regresses by >10% against the committed baseline.

name: vLLM Performance Regression

on:
  pull_request:
    paths:
      - 'vllm-launch-args.sh'
      - 'projects/track6-perf-lab/**'
      - 'serving/**'

jobs:
  bench:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Start vLLM
        run: |
          bash /workspace/start_vllm_server.sh &
          # Wait up to 60s for /health
          for i in $(seq 1 60); do
            curl -sf http://localhost:8000/health && break || sleep 1
          done

      - name: Run regression check
        run: |
          cd projects/track6-perf-lab
          python3 regression/check_regression.py \
            --baseline regression/baseline.json \
            --threshold 0.10

      - name: Upload measurement on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: perf-result
          path: projects/track6-perf-lab/regression/current.json
