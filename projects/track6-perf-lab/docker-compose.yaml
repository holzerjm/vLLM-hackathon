# Minimal Prometheus + Grafana stack for scraping vLLM's /metrics endpoint.
# Works with both `docker compose` and `podman-compose`.

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: perf-prometheus
    network_mode: host              # simpler than container networking for scraping host vLLM
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prom-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.listen-address=:9091'    # avoid :9090 clash with llm-d

  grafana:
    image: grafana/grafana:latest
    container_name: perf-grafana
    network_mode: host
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_HTTP_PORT: "3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus

volumes:
  prom-data:
  grafana-data:
