global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: vllm
    static_configs:
      - targets: ['localhost:8000']
    metrics_path: /metrics

  # Optional: scrape NVIDIA DCGM exporter if you have it running on :9400
  - job_name: dcgm
    static_configs:
      - targets: ['localhost:9400']
